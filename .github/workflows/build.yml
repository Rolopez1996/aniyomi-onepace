name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'

      - name: Dar permisos
        run: chmod +x gradlew || true

      - name: Compilar APK
        run: ./gradlew assembleDebug || echo "Gradle wrapper missing"
